            var match = path.match(/^\/posts\/([^\/]+)\/?$/);
            if (match) {
                var slug = match[1];
                if (redirectMap[slug]) {
                    window.location.replace(redirectMap[slug]);
                    return;
                }
            }

            // Match any slug directly e.g. /slug/
            var directMatch = path.match(/^\/([^\/]+)\/?$/);
            if (directMatch) {
                var slug = directMatch[1];
                if (redirectMap[slug]) {
                    window.location.replace(redirectMap[slug]);
                    return;
                }
            }

            window.location.replace('https://eddyshomepages.fi/');
